<style>
  :root {
    --bg: #fafaf7;
    --surface: #ffffff;
    --text: #1a1a1a;
    --muted: #6b6b6b;
    --accent: #7c3aed;
    --accent-soft: #f3efff;
    --border: #eae7e0;
    --shadow: 0 1px 2px rgba(20,20,20,0.04), 0 8px 24px rgba(20,20,20,0.06);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100%;
  }

  body {
    background-image:
      radial-gradient(1200px 600px at 50% -10%, rgba(124,58,237,0.08), transparent 60%),
      linear-gradient(180deg, #fafaf7 0%, #f5f2ec 100%);
  }

  .wrap {
    max-width: 440px;
    margin: 0 auto;
    padding: 48px 20px 60px;
  }

  .artist {
    text-align: center;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 500;
    font-size: 12px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
  }

  .cover-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 1 / 1;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: var(--shadow);
    background: #eee;
    margin-bottom: 28px;
  }

  .cover-wrap::after {
    content: "";
    position: absolute; inset: 0;
    border-radius: 14px;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.06);
    pointer-events: none;
  }

  .cover {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  h1 {
    text-align: center;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 42px;
    line-height: 1.02;
    letter-spacing: -0.03em;
    margin-bottom: 8px;
  }

  h1 .italic {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-weight: 400;
    letter-spacing: -0.01em;
  }

  .tagline {
    text-align: center;
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 18px;
    color: var(--muted);
    margin-bottom: 32px;
  }

  .divider {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin: 0 0 18px;
    color: var(--muted);
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 500;
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
  }

  .divider::before,
  .divider::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .links { display: flex; flex-direction: column; gap: 10px; }

  .link {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 15px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    text-decoration: none;
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 500;
    font-size: 16px;
    letter-spacing: -0.01em;
    transition: transform 0.15s ease, box-shadow 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    position: relative;
  }

  .link:hover {
    transform: translateY(-1px);
    border-color: var(--accent);
    background: var(--accent-soft);
    box-shadow: 0 6px 18px rgba(124,58,237,0.12);
  }

  .link:active { transform: translateY(0); }

  .link.shop {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    box-shadow: 0 6px 20px rgba(124,58,237,0.28);
  }

  .link.shop .icon { color: #fff; }
  .link.shop .arrow { color: rgba(255,255,255,0.8); }

  .link.shop:hover {
    background: #6d28d9;
    border-color: #6d28d9;
    box-shadow: 0 10px 26px rgba(124,58,237,0.38);
  }

  .link.shop:hover .arrow { color: #fff; }

  .link .icon {
    flex-shrink: 0;
    width: 24px;
    height: 24px;
    display: grid;
    place-items: center;
    color: var(--accent);
  }

  .link .icon svg { width: 100%; height: 100%; }

  .link .label { flex: 1; }

  .link .arrow {
    color: var(--muted);
    font-size: 18px;
    transition: transform 0.2s ease, color 0.2s ease;
  }

  .link:hover .arrow {
    transform: translateX(3px);
    color: var(--accent);
  }

  footer {
    margin-top: 40px;
    text-align: center;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 400;
    font-size: 12px;
    letter-spacing: 0.05em;
    color: var(--muted);
  }

  footer a { color: var(--accent); text-decoration: none; }
  footer a:hover { text-decoration: underline; }

  @media (max-width: 380px) {
    h1 { font-size: 36px; }
    .wrap { padding: 32px 16px 40px; }
  }
</style>
